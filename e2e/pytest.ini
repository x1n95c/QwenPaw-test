[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    --log-cli-level=INFO

# Markers 设计原则：
#   1) 优先级层：p0 / p1 / p2
#   2) 模块层：每个测试文件对应一个模块 marker（按 tests/test_*.py 命名）
#   3) 元数据：test_id 用来标注用例 ID（如 @pytest.mark.test_id("P0-001")）
#   4) 子模块的细分 marker（如 chat_core / chat_session）已合并到模块 marker，
#      避免标签膨胀。如确需进一步分类，请在用例 docstring 中说明。
markers =
    # ----- 运行方式 -----
    ui_smoke: UI smoke test (mocked API, no backend needed)
    integration: Integration test (requires running backend + API keys)

    # ----- 优先级 -----
    p0: P0 级别 - 核心功能（必须通过）
    p1: P1 级别 - 重要功能
    p2: P2 级别 - 次要功能

    # ----- 模块（与 tests/test_*.py 对应）-----
    chat: Chat 对话模块
    chat_core: Chat 核心场景（向后兼容，新用例请使用 chat）
    channels: Channels 频道管理模块
    sessions: Sessions 会话管理模块
    cronjobs: CronJobs 定时任务模块
    heartbeat: Heartbeat 心跳检测模块
    skills: Skills 技能模块
    skill_pool: Skill Pool 技能池模块
    tools: Tools 工具模块
    files: Files 文件管理模块
    mcp: MCP 客户端模块
    security: Security 安全防护模块
    runtime_config: Runtime Config 运行配置模块
    agents: Agents 智能体管理模块
    models: Models 本地模型管理模块
    environments: Environments 环境变量模块
    token_usage: Token Usage 消耗统计模块
    voice: Voice 语音转写模块
    debug: Debug 调试页面模块
    dingtalk: DingTalk 钉钉集成
    cross_module: 跨模块联动测试
    auth: 认证/登录测试
    backups: Backups 备份管理模块
    agent_stats: AgentStats 智能体统计模块
    acp: ACP 配置管理模块

    # ----- 元数据 -----
    test_id: 测试用例 ID（如 @pytest.mark.test_id("P0-001")）
    login_form: Login form rendering

    # ----- 兼容性细分标签（历史用例已使用，新用例请直接用顶层模块 marker）-----
    # Sessions
    sessions_core: (兼容) Sessions 核心
    sessions_edit: (兼容) Sessions 编辑
    sessions_filter: (兼容) Sessions 过滤
    sessions_batch: (兼容) Sessions 批量操作
    sessions_delete: (兼容) Sessions 删除
    sessions_list: (兼容) Sessions 列表
    sessions_detail: (兼容) Sessions 详情
    # Skills
    skills_tag: (兼容) Skills 标签
    skills_filter: (兼容) Skills 过滤
    skills_import: (兼容) Skills 导入
    skills_toggle: (兼容) Skills 启用禁用
    skills_delete: (兼容) Skills 删除
    skills_batch: (兼容) Skills 批量操作
    # Token Usage
    token_core: (兼容) Token Usage 核心
    token_filter: (兼容) Token Usage 筛选
    token_table: (兼容) Token Usage 表格
    token_export: (兼容) Token Usage 导出
    token_api: (兼容) Token Usage API
    # Voice
    voice_core: (兼容) Voice 核心
    voice_toggle: (兼容) Voice 开关
    voice_config: (兼容) Voice 配置
    voice_status: (兼容) Voice 状态
    voice_api: (兼容) Voice API
    voice_integration: (兼容) Voice 集成
    # Agents
    agents_core: (兼容) Agents 核心
    agents_create: (兼容) Agents 创建
    agents_edit: (兼容) Agents 编辑
    agents_delete: (兼容) Agents 删除
    agents_toggle: (兼容) Agents 启用禁用
    agents_api: (兼容) Agents API
    agents_protection: (兼容) Agents 保护
    agents_reorder: (兼容) Agents 拖拽排序
    agents_list: (兼容) Agents 列表
    agents_files: (兼容) Agents 文件管理
    # CronJobs
    cronjobs_core: (兼容) CronJobs 核心
    cronjobs_control: (兼容) CronJobs 启用禁用控制
    cronjobs_schedule: (兼容) CronJobs 调度类型
    cronjobs_create: (兼容) CronJobs 创建
    cronjobs_edit: (兼容) CronJobs 编辑
    cronjobs_delete: (兼容) CronJobs 删除
    cronjobs_execute: (兼容) CronJobs 执行
    cronjobs_toggle: (兼容) CronJobs 启用禁用
    cronjobs_list: (兼容) CronJobs 列表
    # Models
    models_core: (兼容) Models 核心
    models_download: (兼容) Models 下载
    models_serve: (兼容) Models 服务
    models_manage: (兼容) Models 管理
    models_provider: (兼容) Models 提供商
    models_api: (兼容) Models API
    # Heartbeat
    heartbeat_core: (兼容) Heartbeat 核心
    heartbeat_config: (兼容) Heartbeat 配置
    heartbeat_active_hours: (兼容) Heartbeat 活跃时段
    heartbeat_toggle: (兼容) Heartbeat 启用禁用
    heartbeat_interval: (兼容) Heartbeat 间隔配置
    heartbeat_schedule: (兼容) Heartbeat 调度
    heartbeat_skill: (兼容) Heartbeat 技能
    heartbeat_combo: (兼容) Heartbeat 组合
    # Channels
    channels_core: (兼容) Channels 核心
    channels_filter: (兼容) Channels 过滤
    channels_edit: (兼容) Channels 编辑
    channels_enable: (兼容) Channels 启用禁用
    channels_config: (兼容) Channels 配置
    channels_type: (兼容) Channels 类型
    channels_combo: (兼容) Channels 组合
    channels_access_control: (兼容) Channels 访问控制
    # Chat
    chat_context: (兼容) Chat 上下文
    chat_file: (兼容) Chat 文件
    chat_session: (兼容) Chat 会话
    chat_advanced: (兼容) Chat 高级
    chat_validation: (兼容) Chat 输入验证
    # Tools
    tools_toggle: (兼容) Tools 守卫开关
    tools_config: (兼容) Tools 配置
    tools_rules: (兼容) Tools 规则
    tools_preview: (兼容) Tools 规则预览
    tools_file_guard: (兼容) Tools 文件守卫
    # Files
    files_edit: (兼容) Files 编辑
    files_save: (兼容) Files 保存
    files_toggle: (兼容) Files 启用禁用
    files_reorder: (兼容) Files 排序
    files_memory: (兼容) Files 日常记忆
    # MCP
    mcp_create: (兼容) MCP 创建
    mcp_toggle: (兼容) MCP 启用禁用
    mcp_delete: (兼容) MCP 删除
    # AgentConfig (Runtime Config 旧称)
    config: (兼容) AgentConfig
    config_add: (兼容) AgentConfig 添加
    config_edit: (兼容) AgentConfig 编辑
    config_delete: (兼容) AgentConfig 删除
    config_batch: (兼容) AgentConfig 批量
    config_select_all: (兼容) AgentConfig 全选
    # Envs
    envs: (兼容) Envs 环境变量
    envs_core: (兼容) Envs 核心
    envs_add: (兼容) Envs 添加
    envs_edit: (兼容) Envs 编辑
    envs_delete: (兼容) Envs 删除
    envs_batch: (兼容) Envs 批量
    envs_api: (兼容) Envs API
    # Token (旧名)
    token: (兼容) Token (旧)
    # Debug
    debug_log: (兼容) Debug 日志
    debug_filter: (兼容) Debug 过滤
    debug_search: (兼容) Debug 搜索
    # DingTalk
    dingtalk_config: (兼容) DingTalk 配置
    dingtalk_message: (兼容) DingTalk 消息
    dingtalk_integration: (兼容) DingTalk 集成
    # Channels sub-markers used in test_channels.py
    channels_wecom: (兼容) Channels 企业微信
    channels_wechat: (兼容) Channels 微信
    channels_onebot: (兼容) Channels OneBot
    channels_mqtt: (兼容) Channels MQTT
    channels_form: (兼容) Channels 表单

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning

log_cli = true
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
